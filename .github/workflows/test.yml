name: Tests

# Run the test suite (including the accessibility audit) on every push and
# pull request.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
      GCM_CONFIG_PATH: /tmp/gcm-ci-config.toml
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Qt needs these even for the offscreen platform plugin used in CI.
      - name: Install Qt runtime dependencies (Linux)
        run: sudo apt-get update && sudo apt-get install -y libegl1 libxkbcommon0 libxcb-cursor0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest
